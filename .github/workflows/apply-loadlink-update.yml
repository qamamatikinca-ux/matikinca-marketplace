name: Apply LoadLink update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest

    steps:
      - name: Open repository
        uses: actions/checkout@v4

      - name: Install LoadLink update
        shell: bash
        run: |
          set -e

          ZIP="$(find . -maxdepth 1 -type f -name 'loadlink-my-posts-truck-verification*.zip' | head -n 1)"

          if [ -z "$ZIP" ]; then
            echo "No LoadLink update ZIP was found."
            ls -la
            exit 1
          fi

          echo "Using update file: $ZIP"

          rm -rf /tmp/loadlink-update
          mkdir -p /tmp/loadlink-update

          unzip -q "$ZIP" -d /tmp/loadlink-update

          if [ -d "/tmp/loadlink-update/matikinca-marketplace-main" ]; then
            SOURCE="/tmp/loadlink-update/matikinca-marketplace-main"
          else
            SOURCE="/tmp/loadlink-update"
          fi

          rsync -a \
            --exclude=".git/" \
            --exclude=".env" \
            --exclude=".env.*" \
            --exclude="node_modules/" \
            --exclude=".next/" \
            "$SOURCE/" ./

          rm -f "$ZIP"

      - name: Save website changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Add My Posts and truck verification" || exit 0
          git push origin main
